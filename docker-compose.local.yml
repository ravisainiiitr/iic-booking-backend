services:
  django: &django
    build:
      context: .
      dockerfile: ./compose/local/django/Dockerfile
    image: iic_booking_local_django
    container_name: iic_booking_local_django
    depends_on:
      - redis
      - mailpit
    volumes:
      - /app/.venv
      - .:/app:z
    env_file:
      - ./.envs/.local/.django
    environment:
      TZ: Asia/Kolkata
    ports:
      - '8000:8000'
    command: /start

  mailpit:
    image: docker.io/axllent/mailpit:latest
    container_name: iic_booking_local_mailpit
    ports:
      - "8025:8025"

  redis:
    image: docker.io/redis:8.8
    container_name: iic_booking_local_redis

  celeryworker:
    <<: *django
    image: iic_booking_local_celeryworker
    container_name: iic_booking_local_celeryworker
    depends_on:
      - redis
      - mailpit
    ports: []
    command: /start-celeryworker

  celerybeat:
    <<: *django
    image: iic_booking_local_celerybeat
    container_name: iic_booking_local_celerybeat
    depends_on:
      - redis
      - mailpit
    ports: []
    command: /start-celerybeat

  flower:
    <<: *django
    image: iic_booking_local_flower
    container_name: iic_booking_local_flower
    ports:
      - '5555:5555'
    command: /start-flower
