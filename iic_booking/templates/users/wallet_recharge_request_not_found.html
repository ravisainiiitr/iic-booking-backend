<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Not Found</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
            overflow: hidden;
            text-align: center;
        }
        .header {
            background: #6c757d;
            color: white;
            padding: 40px 30px;
        }
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        .content {
            padding: 40px 30px;
        }
        .error-message {
            font-size: 18px;
            color: #495057;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .request-id {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
            color: #6c757d;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            margin-top: 20px;
            transition: all 0.3s;
        }
        .btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }
        .footer {
            text-align: center;
            padding: 20px;
            color: #6c757d;
            font-size: 12px;
            border-top: 1px solid #e9ecef;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon">⚠</div>
            <h1>Request Not Found</h1>
        </div>
        <div class="content">
            <div class="error-message">
                {{ error_message }}
            </div>
            
            {% if request_id %}
            <div class="request-id">
                Request ID: #{{ request_id }}
            </div>
            {% endif %}
            
            <p style="color: #6c757d; margin-top: 20px;">
                The wallet recharge request you are looking for does not exist or may have been deleted.
            </p>
            
            <a href="javascript:window.close()" class="btn">Close</a>
        </div>
        <div class="footer">
            <p>This is an automated page from IIC Booking System.</p>
        </div>
    </div>
</body>
</html>
