name: Deploy Backend

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Show Runner Information
        run: |
          echo "Runner: $(hostname)"
          pwd

      - name: Deploy Backend
        run: |
          cd /home/ubuntu
          ./deploy.sh